const SY='012345678V'.split(''),SYG=[...SY,'S'];const M={lowA:['低確A','lowA'],lowB:['低確B','lowB'],normal:['通常','normal'],prepA:['天準A','prepA'],v:['V-M','v'],heavenS:['天短','heavenS'],heavenL:['天長','heavenL'],super:['超天','super'],gg:['GG','gg'],gzone:['G-ZONE','gzone'],gstop:['G-STOP','gstop']};

let st={g:0,coin:500,spend:0,earn:0,mode:'lowA',phase:'normal',e:['0','0','0'],role:'none',spin:false,panel:null,h:[],mute:true,h5:[],pre:0,pending:false,hold:0,holdReason:'mode',gstop:0,note:'',ggRemain:0,stock:0,gzone:0,lastLoop:'-',ggStage:'OLYMPUS'};let autoLeft=0;
const $=id=>document.getElementById(id),pick=a=>a[Math.floor(Math.random()*a.length)];function pw(a){let t=a.reduce((s,i)=>s+i.w,0),r=Math.random()*t;for(const i of a){r-=i.w;if(r<=0)return i.v}return a.at(-1).v}function one(inv){return Math.random()<1/inv}function eyes(s){return s.split('')}function dist(o){return pw(Object.entries(o).map(([v,w])=>({v,w})))}function bad7(c){return c[0]==='7'&&c[1]==='7'&&c!=='777'}function stopAuto(msg){if(autoLeft>0){autoLeft=0;if(msg)st.note=msg;render()}}function autoStop(res,code){return !!(res&&(res.hit||res.direct||res.autoStop)||['777','SSS','VVV'].includes(code))}function sync(){st.phase=st.gzone>0?'gzone':st.gstop>0?'gstop':st.ggRemain>0?'gg':st.pre>0?'pre':'normal'}function histDisplay(){let a=st.h5.slice(-5);while(a.length<5)a.unshift('-');return a.join(' ')}function stage(reason){st.ggStage=reason==='god'?'GOD':st.stock>=3?'ZEUS':st.stock>=1?'POSEIDON':'OLYMPUS'}
function cand(){const o=['1','3','5'];let t=pw([{v:'ot',w:35},{v:'oo',w:8},{v:'eot',w:7},{v:'seq',w:2},{v:'v',w:7},{v:'l7',w:1}]);if(t==='ot'){let a=pick(o),b=pick(SY.filter(x=>x!==a&&x!=='7'&&x!=='V'));return a+a+b}if(t==='oo')return pick(o)+pick(o)+pick(o);if(t==='eot'){let a=pick(['2','4','6','8']),b=pick(o);return a+b+b}if(t==='seq')return pick(['234','456','678']);if(t==='v')return pick(['V12','2V4','35V','V46','68V','1V5']);if(t==='l7')return '7'+pick(['0','2','4','6','8'])+pick(['0','1','2','3','4','5','6','8','V']);return'153'}function nEye(){let s,l=0;do{s=cand();l++}while((ALL.has(s)||bad7(s))&&l<80);return eyes(!ALL.has(s)&&!bad7(s)?s:'153')}
function drawRole(){return pw(R.map(r=>({v:r,w:1/r.inv})))}function histSym(ch){if(['ub','mb'].includes(ch.k))return'青';if(['ly','ry','cry','my'].includes(ch.k))return'黄';if(['oneB','oneC','rf'].includes(ch.k))return'宝';if(ch.k==='red7')return'赤';if(ch.k==='god')return'神';return'-'}function tail(x){let n=0;for(let i=st.h5.length-1;i>=0;i--){if(st.h5[i]===x)n++;else break}return n}function updH(ch){st.h5.push(histSym(ch));st.h5=st.h5.slice(-5);return{b:tail('青'),y:tail('黄'),gem:st.h5.filter(x=>x==='宝').length}}

const T={lowA:{haz:{lowA:99.8,lowB:.17,normal:.02},ub:{lowA:99.8,lowB:.17,normal:.02},mb:{lowA:66,lowB:29,normal:3,prepA:1,heavenS:.1},ry:{lowA:78,lowB:21,normal:.8,prepA:.2},my:{lowB:68,normal:25,prepA:6,heavenS:1},sp:{heavenL:50,super:50}},lowB:{haz:{lowA:.1,lowB:99.7,normal:.2},ub:{lowA:.1,lowB:99.7,normal:.2},mb:{lowB:67,normal:31,prepA:2},ry:{lowB:78,normal:21,prepA:1},my:{normal:75,prepA:23,heavenS:2},sp:{heavenL:50,super:50}},normal:{haz:{lowA:.2,lowB:.05,normal:99.6,prepA:.17},ub:{lowA:.2,lowB:.05,normal:99.6,prepA:.17},mb:{normal:67,prepA:32,heavenS:.4,heavenL:.05},ry:{normal:78,prepA:22,heavenS:.1},my:{prepA:92,heavenS:6,heavenL:1,super:.2},sp:{heavenL:50,super:50}},prepA:{haz:{lowA:.8,lowB:.1,normal:.1,prepA:98.9,heavenS:.1},ub:{lowA:.8,lowB:.1,normal:.1,prepA:98.9,heavenS:.1},mb:{prepA:67,heavenS:33,heavenL:.2},ry:{prepA:84,heavenS:15,heavenL:.1},my:{prepA:25,heavenS:73,heavenL:1.6,super:.4},sp:{heavenL:50,super:50}},v:{haz:{lowA:2.7,lowB:.4,normal:.2,prepA:.1,v:96.6},ub:{lowA:2.7,lowB:.4,normal:.2,prepA:.1,v:96.6}},heavenS:{haz:{lowA:2.7,lowB:.4,normal:.2,prepA:.1,heavenS:96.5,heavenL:.1},ub:{lowA:2.7,lowB:.4,normal:.2,prepA:.1,heavenS:96.5,heavenL:.1},mb:{heavenS:97,heavenL:3},ry:{heavenS:98.8,heavenL:1.2},my:{heavenS:75,heavenL:23,super:2}},heavenL:{haz:{heavenS:1.7,heavenL:98.3},ub:{heavenS:1.7,heavenL:98.3},mb:{heavenL:94,super:6},ry:{heavenL:98,super:2},my:{heavenL:75,super:25}},super:{haz:{heavenL:17.5,super:82.5},ub:{heavenL:17.5,super:82.5}}};function trans(ch){let tbl=T[st.mode]&&T[st.mode][ch.k];return tbl?dist(tbl):st.mode}
function loopRate(reason){return reason==='god'?pw([{v:.01,w:50},{v:.25,w:35},{v:.5,w:12},{v:.66,w:2},{v:.75,w:1}]):reason==='red7'?pw([{v:.01,w:75},{v:.25,w:18},{v:.5,w:6},{v:.66,w:1}]):pw([{v:.01,w:85},{v:.25,w:12},{v:.5,w:2.5},{v:.66,w:.5}])}function rollLoop(r){let add=0;while(Math.random()<r&&add<20)add++;return add}function startGG(base,reason){let r=loopRate(reason),ex=rollLoop(r);st.stock+=Math.max(0,base-1)+ex;st.ggRemain=100;st.mode='gg';st.phase='gg';st.gzone=0;st.lastLoop=Math.round(r*100)+'%';stage(reason);st.note=`GG開始 ${base}set + loop${ex} / ${st.lastLoop}`}function endGG(){if(st.stock>0){st.stock--;st.ggRemain=100;stage('continue');st.note='GG継続'}else{st.mode='gzone';st.phase='gzone';st.gzone=5;st.ggRemain=0;st.note='G-ZONE開始'}}function startPre(sets,reason,n){if(st.pending)return;st.pre=pw([{v:3,w:8},{v:5,w:12},{v:7,w:18},{v:9,w:18},{v:12,w:15},{v:16,w:12},{v:24,w:10},{v:32,w:7}]);st.phase='pre';st.pending=true;st.hold=sets;st.holdReason=reason;st.note=n+' / 前兆'+st.pre+'G'}
function genNormal(){let ch=drawRole(),h=updH(ch),res={role:'none',e:nEye(),pay:0,note:ch.n,child:ch.k};if(['ub','mb'].includes(ch.k))res.role='replay';if(['ly','ry','cry','my'].includes(ch.k)){res.role='yellow';res.pay=8}if(['oneB','oneC','rf'].includes(ch.k)){res.role='chance';res.pay=1}if(ch.k==='god')return{role:'god',e:['7','7','7'],pay:120,note:'GOD',child:ch.k,hit:true,direct:true,sets:5,reason:'god'};if(['red7','sp'].includes(ch.k))return{role:'red7',e:['S','S','S'],pay:80,note:'赤7/S',child:ch.k,hit:true,direct:true,sets:1,reason:'red7'};if(h.b>=5){res.hit=true;res.sets=1;res.reason='history';res.note='青7 5連'}if(h.y>=4){res.hit=true;res.sets=1;res.reason='history';res.note='黄7 4連'}if(!res.hit&&h.y===3&&one(5)){res.hit=true;res.sets=1;res.reason='history';res.note='黄7 3連'}if(!res.hit&&h.gem>=4){res.hit=true;res.sets=1;res.reason='history';res.note='宝石4個'}if(!res.hit&&h.gem>=2&&one(h.gem===2?8:2)){res.hit=true;res.sets=1;res.reason='history';res.note='宝石履歴'}if(!res.hit&&rollGG(ch)){res.hit=true;res.sets=1;res.reason='mode';res.note=ch.n+' / GG当選'}res.e=res.hit?eyes(pick(REACH)):res.e;return res}
function genPre(){if(st.pre<=1)return{role:'reach',e:eyes(pick(REACH)),pay:0,note:'前兆最終',autoStop:true};let r=Math.random();return r<.25?{role:'chance',e:eyes(pick(CH)),pay:0,note:'前兆中'}:r<.38?{role:'reach',e:eyes(pick(REACH)),pay:0,note:'前兆中'}:{role:'none',e:nEye(),pay:0,note:'前兆中'}}function genGG(){let ch=drawRole(),h=updH(ch),res={role:['ub','mb'].includes(ch.k)?'replay':['ly','ry','cry','my'].includes(ch.k)?'yellow':'none',e:nEye(),pay:12,note:'GG中 '+ch.n};if(ch.k==='god')return{role:'god',e:['7','7','7'],pay:120,note:'GG中 GOD',hit:true,sets:5,reason:'god'};if(ch.k==='red7')return{role:'red7',e:['S','S','S'],pay:80,note:'GG中 赤7',hit:true,sets:1,reason:'red7'};if(ch.k==='my'&&one(4)||h.y>=5||h.gem>=3){res.role='reach';res.e=eyes(pick(REACH));res.hit=true;res.sets=1;res.reason='ggHist';res.note='GG中 上乗せ'}return res}function genGZ(){let r=Math.random();if(r<.06)return{role:'reach',e:eyes(pick(['135','315','V31','V34',...REACH.slice(0,10)])),hit:true,sets:1,reason:'gzone',pay:0,note:'G-ZONE リーチ目'};if(r<.14){let d=pick(['1','3','5']);return{role:'reach',e:[d,d,d],hit:true,sets:1,reason:'gzone',pay:0,note:'G-ZONE 奇数'}}if(r<.17)return{role:'vwin',e:['V','V','V'],hit:true,sets:3,reason:'v',pay:0,note:'G-ZONE V'};if(r<.18)return{role:'god',e:['7','7','7'],hit:true,sets:5,reason:'god',pay:0,note:'G-ZONE 777'};return{role:'none',e:eyes(pick(GZ)),pay:0,note:'G-ZONE中'}}function genGS(){return Math.random()<.5?{role:'reach',e:eyes(pick(REACH)),pay:30,note:'G-STOP 当選',hit:true,sets:1,reason:'gstop'}:{role:'none',e:nEye(),pay:0,note:'G-STOP中'}}function kind(c){if(REACH.includes(c))return'リーチ目';if(CH.includes(c))return'チャンス目';if(c==='777')return'GOD';if(c==='SSS')return'S';return'通常目'}
function render(){sync();let mi=st.gzone>0?M.gzone:st.gstop>0?M.gstop:M[st.mode]||M.lowA;$('fr').className='fr '+mi[1];$('ml').textContent=st.mute?'STD':mi[0];$('ga').textContent=`G ${String(st.g).padStart(4,'0')}${st.gzone>0?' GZ'+st.gzone:''}${st.pre>0?' P'+st.pre:''}`;$('ro').textContent=`${st.e.join(' ')}  ${PAY[st.role][0]}`;$('cr').textContent='CREDIT '+st.coin;$('lh').textContent='HIST '+histDisplay();$('gs').textContent=(st.ggRemain>0?`GG ${st.ggRemain} / ${st.ggStage} / ST ${st.stock} / LOOP ${st.lastLoop}`:st.gzone>0?`G-ZONE ${st.gzone} / STOCK ${st.stock}`:'GG - / STOCK -')+(autoLeft>0?' / AUTO '+autoLeft:'');$('re').innerHTML=st.e.map(x=>`<div class="reel">${x}</div>`).join('');document.body.classList.toggle('spin',st.spin);panel()}function panel(){let p=$('pa');if(!st.panel){p.className='p';p.innerHTML='';return}p.className='p show';let net=st.earn-st.spend;if(st.panel==='data')p.innerHTML=`<b>▣ 収支</b><div class="grid"><div class="card">投入<b>${st.spend}</b></div><div class="card">払出<b>${st.earn}</b></div><div class="card">差枚<b>${net}</b></div><div class="card">回転<b>${st.g}</b></div></div>`;if(st.panel==='mode')p.innerHTML=`<b>▣ 状態</b><div>現在: <b>${M[st.mode]?.[0]||st.phase}</b></div><div class="small">PHASE: ${st.phase} / GG:${st.ggRemain}G / ST:${st.stock} / ${st.ggStage}</div>`;if(st.panel==='hist')p.innerHTML=`<b>▣ 履歴</b><div class="hist">${st.h.map(x=>`<div class="hrow"><span>#${x.g}</span><b>${x.e}</b><span>${x.r}/${x.k}</span><span>+${x.p}</span></div>`).join('')||'<div class="small">なし</div>'}</div>`;if(st.panel==='law')p.innerHTML='<b>▣ 方針</b><div class="small">履歴は青/黄/宝/赤/神/- の5枠固定。phase管理: normal/pre/gg/gzone/gstop。GG中履歴抽選とG-ZONE専用出目を実装。</div>'}
function finish(res,pay,nm){let code=res.e.join('');st.e=res.e;st.role=res.role||'none';st.mode=nm||st.mode;st.g++;st.coin+=pay;st.earn+=pay;st.h.unshift({g:st.g,e:code,r:PAY[st.role][0],k:kind(code),p:pay});st.h=st.h.slice(0,30);if(autoStop(res,code))autoLeft=0;st.spin=false;save();render();if(autoLeft>0)setTimeout(spin,70)}function spin(){if(st.spin)return;if(autoLeft>0)autoLeft--;st.spin=true;st.coin=Math.max(0,st.coin-3);st.spend+=3;render();let n=0,t=setInterval(()=>{st.e=st.gzone>0?eyes(pick(GZ)):nEye();render();if(++n>8){clearInterval(t);let res,pay=0,nm=st.mode;if(st.ggRemain>0){res=genGG();pay=res.pay||0;if(res.hit){st.stock+=res.sets||1;st.note=res.note}st.ggRemain--;if(st.ggRemain<=0)endGG();return finish(res,pay,st.mode)}if(st.gzone>0){res=genGZ();pay=res.pay||0;if(res.hit){startGG(res.sets||1,res.reason);pay+=30;nm='gg'}else{st.gzone--;if(st.gzone<=0){st.mode='lowA';st.phase='normal';st.note='G-ZONE終了';nm='lowA'}}return finish(res,pay,nm)}if(st.pre>0){res=genPre();st.pre--;if(st.pre<=0&&st.pending){startGG(st.hold||1,st.holdReason);st.pending=false;res.hit=true;res.autoStop=true;nm='gg'}return finish(res,res.pay||0,nm)}res=st.gstop>0?genGS():genNormal();pay=res.pay||0;nm=res.child?trans({k:res.child}):st.mode;if(res.direct){startGG(res.sets||1,res.reason);nm='gg'}else if(res.hit){startPre(res.sets||1,res.reason||'mode',res.note);pay=0;nm=st.mode}finish(res,pay,nm)}},55)}function reset(){autoLeft=0;st={g:0,coin:500,spend:0,earn:0,mode:'lowA',phase:'normal',e:['0','0','0'],role:'none',spin:false,panel:null,h:[],mute:true,h5:[],pre:0,pending:false,hold:0,holdReason:'mode',gstop:0,note:'',ggRemain:0,stock:0,gzone:0,lastLoop:'-',ggStage:'OLYMPUS'};save();render()}function auto(n){if(st.spin)return;autoLeft=n;spin()}function key(k){if(k==='AC')return reset();if(k==='MODE')st.panel=st.panel==='mode'?null:'mode';else if(k==='DATA')st.panel=st.panel==='data'?null:'data';else if(k==='÷')st.panel=st.panel==='hist'?null:'hist';else if(k==='×')st.panel=st.panel==='law'?null:'law';else if(k==='−')st.mute=!st.mute;else if('123456789'.includes(k))return auto(+k);else if(k==='0')return auto(10);else if(k==='00')return auto(100);else return spin();render()}function safe(){try{localStorage.setItem('__t','1');localStorage.removeItem('__t');return true}catch(e){return false}}const STORE=safe();function save(){if(STORE)localStorage.setItem('calc777v11',JSON.stringify(st))}function load(){if(STORE){let x=JSON.parse(localStorage.getItem('calc777v11')||'null');if(x)st={...st,...x,spin:false,panel:null}}}function build(){let rows=[['AC','MODE','DATA','÷'],['7','8','9','×'],['4','5','6','−'],['1','2','3','+'],['0','00','.','=']];$('keys').innerHTML=rows.flat().map(k=>`<button class="${k==='AC'?'d':['MODE','DATA','÷','×','−','+','='].includes(k)?'o':'n'}" data-k="${k}">${k}</button>`).join('');$('keys').onclick=e=>{let b=e.target.closest('button');if(b)key(b.dataset.k)}}document.addEventListener('pointerdown',()=>{if(autoLeft>0)stopAuto('AUTO停止')},{passive:true});load();build();render();</script></body></html>
