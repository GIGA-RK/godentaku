<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CALC-777 v16.0</title>
    <link rel="stylesheet" href="./css/style.css" />
    <script src="./js/tables.js" defer></script>
    <script src="./js/main.js" defer></script>
    <script src="./js/ui.js" defer></script>
  </head>
  <body>
<main class="w">
      <div class="top">
        <div>▣ CALC-777 v16.0</div>
        <div>calculator</div>
      </div>
      <section class="calc">
        <div id="fr" class="fr lowA">
          <div class="lcd">
            <div id="ggBanner" class="ggBanner">GOD GAME中</div>
            <div id="dummyScreen" class="dummyScreen">
              <div class="dummyBox">
                <div class="dummyTop"><span>CALC</span><span>DEG</span></div>
                <div id="dummyValue" class="dummyValue">0</div>
              </div>
            </div>
            <div class="lcdMain">
              <div class="lcdInfo">
                <div id="ga" class="line lcdLine1">
                  <span id="gameText">G数：000000</span>
                  <span id="coinText">Coin：000000</span>
                </div>
                <div id="lh" class="sub lcdLine2">
                  <span id="histText" class="histText"><span class="histLabel">履歴：</span><span class="histSym">-</span><span class="histSym">-</span><span class="histSym">-</span><span class="histSym">-</span><span class="histSym">-</span></span>
                  <span id="statusText">GG:--- ST:---</span>
                </div>
              </div>
              <div class="lcdBottom">
                <div id="stageBig" class="stageBig"><span class="stageMain">湖</span></div>
                <div id="roleBig" class="roleBig">ハズレ</div>
                <div id="re" class="reels">
                  <div class="reel"><span class="reelSym reelGreen">0</span></div>
                  <div class="reel"><span class="reelSym reelRed">1</span></div>
                  <div class="reel"><span class="reelSym reelYellow">2</span></div>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div id="pa" class="p"></div>
        <div id="keys" class="keys"></div>
        <div class="foot">
          AUTO中: 数字/00/./AC=停止のみ / 液晶タップ=停止 / スワイプ無効
        </div>
      </section>
    </main>
  </body>
</html>
