    <style>

    </style>
  </head>
  <body>
    <main class="w">
      <div class="top">
        <div>▣ CALC-777 v12.4</div>
        <div>calculator</div>
      </div>
      <section class="calc">
        <div id="fr" class="fr lowA">
          <div class="lcd">
            <div id="ggBanner" class="ggBanner">GOD GAME中</div>
            <div class="lcdMain">
              <div class="lcdSide">
                <div id="stageBig" class="stageBig"><span class="stageMain">湖</span></div>
                <div id="roleBig" class="roleBig">ハズレ</div>
              </div>
              <div class="lcdRight">
                <div class="lcdInfo">
                  <div id="ga" class="line lcdLine1">
                    <span id="gameText">G数：000000</span>
                    <span id="coinText">Coin：000000</span>
                  </div>
                  <div id="lh" class="sub lcdLine2">
                    <span id="histText" class="histText"><span class="histLabel">履歴：</span><span class="histSym">-</span><span class="histSym">-</span><span class="histSym">-</span><span class="histSym">-</span><span class="histSym">-</span></span>
                    <span id="statusText">GG:--- ST:---</span>
                  </div>
                </div>
                <div id="re" class="reels">
                  <div class="reel">0</div>
                  <div class="reel">0</div>
                  <div class="reel">0</div>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div id="pa" class="p"></div>
        <div id="keys" class="keys"></div>
        <div class="foot">
          1-9=指定回 / 0=10回 / 00=100回 / .=無限AUTO / ×=DEBUG / 画面タップでAUTO停止
        </div>
      </section>
    </main>
    <script>
      const SY = "012345678V".split(""),
        SYG = [...SY, "S"];
      const M = {
        lowA: ["低確A", "lowA"],
        lowB: ["低確B", "lowB"],
        normal: ["通常", "normal"],
        prepA: ["天準A", "prepA"],
        v: ["V-M", "v"],
        heavenS: ["天短", "heavenS"],
        heavenL: ["天長", "heavenL"],
        super: ["超天", "super"],
        gg: ["GG", "gg"],
        gzone: ["G-ZONE", "gzone"],
        gstop: ["G-STOP", "gstop"],
      };
      const PAY = {
        none: ["ハズレ", 0],
        replay: ["青7", 0],
        three: ["3枚役", 3],
        yellow: ["黄7", 8],
        navYellow: ["押順黄7", 15],
        chance: ["チャンス目", 1],
        reach: ["リーチ目", 30],
        gstop: ["G-STOP", 0],
        red7: ["赤7/S", 80],
        god: ["GOD", 120],
        vwin: ["V揃い", 50],
      };
      const R = [
        ["haz", "ハズレ", 1.5],
        ["oneA", "1枚A", 10.4],
        ["oneB", "1枚B", 102.4],
        ["oneC", "1枚C", 409.6],
        ["ub", "上段青7", 7.9],
        ["mb", "中段青7", 99.9],
        ["ly", "下段黄7", 17.4],
        ["ry", "右上黄7", 57.7],
        ["cry", "共通右上黄7", 655.4],
        ["my", "中段黄7", 936.2],
        ["rf", "赤7フェイク", 327.7],
        ["red7", "赤7", 5461.3],
        ["god", "GOD", 8192],
        ["sp", "特殊SP", 65536],
      ].map((x) => ({ k: x[0], n: x[1], inv: x[2] }));
      const AT_R = [
        // 5号機「神々の凱旋」GG中寄せの簡易小役テーブル。
        // 3枚役と押し順15枚黄7を主軸にして、黄7履歴が出すぎないように調整。
        ["three", "3枚役", 1.8, "three", 3],
        ["py", "押し順15枚黄7", 4.4, "navYellow", 15],
        ["ub", "上段青7", 5.4, "replay", 0],
        ["oneB", "1枚役", 102.4, "chance", 1],
        ["oneC", "1枚役", 409.6, "chance", 1],
        ["mb", "中段青7", 99.9, "replay", 0],
        ["pry", "押順右上黄7", 57.7, "yellow", 15],
        ["cry", "共通右上黄7", 655.4, "yellow", 15],
        ["my", "中段黄7", 936.2, "yellow", 15],
        ["rfA", "赤7フェイクA", 655.4, "chance", 1],
        ["rfB", "赤7フェイクB", 655.4, "chance", 1],
        ["sp", "特殊SP", 65536, "red7", 80],
        ["red7", "赤7", 6553.6, "red7", 80],
        ["red7m", "中段赤7", 32768, "red7", 80],
        ["god", "GOD", 8192, "god", 120],
      ].map((x) => ({
        k: x[0],
        n: x[1],
        inv: x[2],
        role: x[3],
        pay: x[4],
      }));
      const GG = {
        lowA: 3532.1,
        lowB: 3532.1,
        normal: 751,
        prepA: 3532.1,
        v: 18.2,
        heavenS: 33,
        heavenL: 18.5,
        super: 11,
      };
      const CEILING_G = 1480;
      const SETTING = 1;
      const REACH =
          "007 012 026 032 038 046 04V 075 0V0 104 110 123 135 168 175 184 201 223 280 283 2V1 315 324 344 354 365 415 423 428 448 481 4V8 508 510 514 526 543 564 56V 5V0 5V4 634 664 681 728 753 758 78V 801 808 821 841 845 850 873 87V 884 V07 V31 V34".split(
            " ",
          ),
        CH =
          "101 303 505 707 100 300 500 V0V V2V V4V V6V V8V 38V 468 631 831".split(
            " ",
          ),
        GZ = "135 315 V31 V34 113 331 553 V1V V3V V5V".split(" "),
        ALL = new Set([...REACH, ...CH, ...GZ, "777", "SSS", "VVV"]),
        ODD_WIN = new Set(["111", "333", "555"]);
      let st = {
        g: 0,
        coin: 0,
        spend: 0,
        earn: 0,
        mode: "lowA",
        phase: "normal",
        e: ["0", "0", "0"],
        role: "none",
        spin: false,
        panel: null,
        h: [],
        mute: true,
        h5: [],
        pre: 0,
        pending: false,
        hold: 0,
        holdReason: "mode",
        gstop: 0,
        gstopStock: 0,
        gstopHit: false,
        tenjoG: 0,
        note: "",
        ggRemain: 0,
        stock: 0,
        gzone: 0,
        lastLoop: "-",
        ggStage: "OLYMPUS",
        normalStage: "湖",
        stageGames: 0,
        forceRole: null,
      };
      let autoLeft = 0;
      const $ = (id) => document.getElementById(id),
        pick = (a) => a[Math.floor(Math.random() * a.length)];
      function pw(a) {
        let t = a.reduce((s, i) => s + i.w, 0),
          r = Math.random() * t;
        for (const i of a) {
          r -= i.w;
          if (r <= 0) return i.v;
        }
        return a.at(-1).v;
      }
      function one(inv) {
        return Math.random() < 1 / inv;
      }
      function eyes(s) {
        return s.split("");
      }
      function dist(o) {
        return pw(Object.entries(o).map(([v, w]) => ({ v, w })));
      }
      function bad7(c) {
        return c[0] === "7" && c[1] === "7" && c !== "777";
      }
      function isOddWin(c) {
        return ODD_WIN.has(c);
      }
      function stopAuto(msg) {
        if (autoLeft !== 0) {
          autoLeft = 0;
          if (msg) st.note = msg;
          render();
        }
      }
      function autoStop(res, code) {
        return !!(
          (res && (res.hit || res.direct || res.autoStop)) ||
          ["777", "SSS", "VVV"].includes(code)
        );
      }
      function sync() {
        st.phase =
          st.gzone > 0
            ? "gzone"
            : st.gstop > 0
              ? "gstop"
              : st.ggRemain > 0
                ? "gg"
                : st.pre > 0
                  ? "pre"
                  : "normal";
      }
      function histDisplay() {
        let a = st.h5.slice(-5);
        while (a.length < 5) a.push("-");
        return a.join(" ");
      }
      function stage(reason) {
        st.ggStage =
          reason === "god"
            ? "GOD"
            : st.stock >= 3
              ? "ZEUS"
              : st.stock >= 1
                ? "POSEIDON"
                : "OLYMPUS";
      }
      function normalStageForMode(mode) {
        const tbl = {
          lowA: [
            { v: "湖", w: 38 },
            { v: "庭園", w: 32 },
            { v: "遺跡", w: 25 },
            { v: "山", w: 4 },
            { v: "神殿", w: 1 },
          ],
          lowB: [
            { v: "湖", w: 24 },
            { v: "庭園", w: 34 },
            { v: "遺跡", w: 32 },
            { v: "山", w: 8 },
            { v: "神殿", w: 2 },
          ],
          normal: [
            { v: "湖", w: 12 },
            { v: "庭園", w: 24 },
            { v: "遺跡", w: 42 },
            { v: "山", w: 17 },
            { v: "神殿", w: 5 },
          ],
          prepA: [
            { v: "湖", w: 4 },
            { v: "庭園", w: 8 },
            { v: "遺跡", w: 28 },
            { v: "山", w: 50 },
            { v: "神殿", w: 10 },
          ],
          v: [
            { v: "湖", w: 3 },
            { v: "庭園", w: 6 },
            { v: "遺跡", w: 21 },
            { v: "山", w: 35 },
            { v: "神殿", w: 35 },
          ],
          heavenS: [
            { v: "湖", w: 2 },
            { v: "庭園", w: 4 },
            { v: "遺跡", w: 14 },
            { v: "山", w: 28 },
            { v: "神殿", w: 52 },
          ],
          heavenL: [
            { v: "湖", w: 1 },
            { v: "庭園", w: 3 },
            { v: "遺跡", w: 10 },
            { v: "山", w: 26 },
            { v: "神殿", w: 60 },
          ],
          super: [
            { v: "湖", w: 1 },
            { v: "庭園", w: 2 },
            { v: "遺跡", w: 7 },
            { v: "山", w: 20 },
            { v: "神殿", w: 70 },
          ],
        };
        return pw(tbl[mode] || tbl.lowA);
      }
      function maybeStageChange(force = false, mode = st.mode) {
        if (st.ggRemain > 0 || st.gzone > 0 || st.gstop > 0) return;
        st.stageGames = Number(st.stageGames) || 0;
        if (force || st.stageGames <= 0 || Math.random() < 0.07) {
          st.normalStage = normalStageForMode(mode);
          st.stageGames = Math.floor(8 + Math.random() * 25);
        } else {
          st.stageGames--;
        }
      }
      function cand() {
        const o = ["1", "3", "5"];
        let t = pw([
          { v: "ot", w: 35 },
          { v: "oo", w: 8 },
          { v: "eot", w: 7 },
          { v: "seq", w: 2 },
          { v: "v", w: 7 },
          { v: "l7", w: 1 },
        ]);
        if (t === "ot") {
          let a = pick(o),
            b = pick(SY.filter((x) => x !== a && x !== "7" && x !== "V"));
          return a + a + b;
        }
        if (t === "oo") return pick(o) + pick(o) + pick(o);
        if (t === "eot") {
          let a = pick(["2", "4", "6", "8"]),
            b = pick(o);
          return a + b + b;
        }
        if (t === "seq") return pick(["234", "456", "678"]);
        if (t === "v") return pick(["V12", "2V4", "35V", "V46", "68V", "1V5"]);
        if (t === "l7")
          return (

        let a = (st.h5 || []).map(cleanHistItem).slice(-5).reverse();
        while (a.length < 5) a.push("-");
        return a.join("");
      }
      function histClass(x) {
        if (x === "青") return "histBlue";
        if (x === "黄") return "histYellow";
        if (x === "宝") return "histGem";
        return "";
      }
      function histMark(x) {
        if (x === "青" || x === "黄") return "7";
        if (x === "宝") return "◆";
        return x;
      }
      function fixedHistHtml() {
        // 表示だけ逆向きにする。左が最新、右が古い履歴。
        // 内部配列 st.h5 は古い→新しいのままなので、連続判定は壊さない。
        let a = (st.h5 || []).map(cleanHistItem).slice(-5).reverse();
        while (a.length < 5) a.push("-");
        return `<span class="histLabel">履歴：</span>${a
          .map((x) => `<span class="histSym ${histClass(x)}">${histMark(x)}</span>`)
          .join("")}`;
      }
      function fixedStatus() {
        if (st.ggRemain > 0) {
          return `GG:${fixedNum(st.ggRemain, 3)} ST:${fixedNum(st.stock, 3)}`;
        }
        if (st.gzone > 0) {
          return `GZ:${fixedNum(st.gzone, 3)} ST:${fixedNum(st.stock, 3)}`;
        }
        if (st.gstop > 0) {
          return `GS:${fixedNum(st.gstop, 3)} ST:${fixedNum(st.stock, 3)}`;
        }
        if ((st.gstopStock || 0) > 0) {
          return `GS:${fixedNum(st.gstopStock, 3)} ST:${fixedNum(st.stock, 3)}`;
        }
        if (st.pre > 0) return `P:${fixedNum(st.pre, 3)} ST:---`;
        return "GG:--- ST:---";
      }
      function stayStageHtml() {
        if (st.ggRemain > 0) {
          return `<span class="stageMain">${stageLabel()}</span>`;
        }
        if (st.gzone > 0) {
          return '<span class="stageMain">G-ZONE</span>';
        }
        if (st.gstop > 0) {
          return '<span class="stageMain">G-STOP</span>';
        }
        return `<span class="stageMain">${st.normalStage || "湖"}</span>`;
      }
      function normalizeDisplayState() {
        if (
          st.ggRemain <= 0 &&
          st.gzone <= 0 &&
          st.gstop <= 0 &&
          ["gg", "gzone", "gstop"].includes(st.mode)
        ) {
          st.mode = "lowA";
          st.phase = "normal";
        }
      }
      function render() {
        normalizeDisplayState();
        sync();
        let mi =
          st.gzone > 0
            ? M.gzone
            : st.gstop > 0
              ? M.gstop
              : M[st.mode] || M.lowA;
        $("fr").className = "fr " + mi[1];
        $("stageBig").innerHTML = stayStageHtml();
        $("roleBig").textContent = PAY[st.role][0];
        $("gameText").innerHTML = formatGameText();
        $("coinText").innerHTML = formatCoinText();
        $("histText").innerHTML = fixedHistHtml();
        $("statusText").innerHTML = formatStatusText();
        $("ggBanner").classList.toggle("show", st.ggRemain > 0);
        $("re").className = `reels${st.ggRemain > 0 ? " atActive" : ""}`;
        $("re").innerHTML = st.e
          .map((x) => `<div class="reel">${x}</div>`)
          .join("");
        document.body.classList.toggle("spin", st.spin);
        panel();
      }
      function stageLabel() {
        const names = {
          OLYMPUS: "オリンポス",
          POSEIDON: "ポセイドン",
          ZEUS: "ゼウス",
          GOD: "ゴッド",
        };
        return names[st.ggStage] || st.ggStage || "---";
      }
      function panel() {
        let p = $("pa");
        if (!st.panel) {
          p.className = "p";
          p.innerHTML = "";
          return;
        }
        p.className = "p show";
        let net = st.earn - st.spend;
        if (st.panel === "data")
          p.innerHTML = `<b>▣ 収支</b><div class="grid"><div class="card">投入<b>${st.spend}</b></div><div class="card">払出<b>${st.earn}</b></div><div class="card">差枚<b>${net}</b></div><div class="card">回転<b>${st.g}</b></div></div>`;
        if (st.panel === "mode")
          p.innerHTML = `<b>▣ 状態</b><div>現在: <b>${M[st.mode]?.[0] || st.phase}</b></div><div>ステージ: <b>${stageLabel()}</b></div><div class="small">天井まで: ${Math.max(0, CEILING_G - (st.tenjoG || 0))}G / G-STOP保持: ${st.gstopStock || 0}</div>`;
        if (st.panel === "hist")
          p.innerHTML = `<b>▣ 履歴</b><div class="hist">${st.h.map((x) => `<div class="hrow"><span>#${x.g}</span><b>${x.e}</b><span>${x.r}/${x.k}</span><span>+${x.p}</span></div>`).join("") || '<div class="small">なし</div>'}</div>`;
        if (st.panel === "debug")
          p.innerHTML = `<b>▣ デバッグ</b>
            <div class="small">強制状態や、次ゲームの小役を指定できます。3枚役・押順系はGG中テーブル用です。</div>
            <div class="dbgSec">
              <p class="dbgTitle">強制状態</p>
              <div class="dbgBtns">
                <button class="o" data-debug="mode:lowA">低確A</button>
                <button class="o" data-debug="mode:lowB">低確B</button>
                <button class="o" data-debug="mode:normal">通常</button>
                <button class="o" data-debug="mode:prepA">天準A</button>
                <button class="o" data-debug="mode:v">V-M</button>
                <button class="o" data-debug="mode:heavenS">天短</button>
                <button class="o" data-debug="mode:heavenL">天長</button>
                <button class="o" data-debug="mode:super">超天</button>
                <button class="o" data-debug="gg">GG開始</button>
                <button class="o" data-debug="gzone">G-ZONE</button>
                <button class="o" data-debug="gstop">G-STOP</button>
                <button class="o" data-debug="tenjo">天井直前</button>
              </div>
            </div>
            <div class="dbgSec">
              <p class="dbgTitle">次ゲーム小役</p>
              <div class="dbgBtns">
                <button class="n" data-debug="role:py">押順黄7</button>
                <button class="n" data-debug="role:ub">上段青7</button>
                <button class="n" data-debug="role:mb">中段青7</button>
                <button class="n" data-debug="role:ly">下段黄7</button>
                <button class="n" data-debug="role:pry">押順右上黄7</button>
                <button class="n" data-debug="role:ry">右上黄7</button>
                <button class="n" data-debug="role:my">中段黄7</button>
                <button class="n" data-debug="role:oneB">宝石</button>
                <button class="n" data-debug="role:red7">赤7</button>
                <button class="n" data-debug="role:god">GOD</button>
                <button class="n" data-debug="stage">ステチェン</button>
              </div>
            </div>`;
      }
      function finish(res, pay, nm) {
        let code = res.e.join("");
        st.e = res.e;
        st.role = res.role || "none";
        st.mode = nm || st.mode;
        st.g++;
        st.coin += pay;
        st.earn += pay;
        st.h.unshift({
          g: st.g,
          e: code,
          r: PAY[st.role][0],
          k: kind(code),
          p: pay,
        });
        st.h = st.h.slice(0, 30);
        maybeStageChange(false, st.mode);
        if (autoStop(res, code)) autoLeft = 0;
        st.spin = false;
        save();
        render();
        if (autoLeft !== 0) setTimeout(spin, 70);
      }
      function spin() {
        if (st.spin) return;
        if (autoLeft > 0) autoLeft--;
        st.spin = true;
        st.coin -= 3;
        st.spend += 3;
        render();
        let n = 0,
          t = setInterval(() => {
            st.e = st.gzone > 0 ? eyes(pick(GZ)) : nEye();
            render();
            if (++n > 8) {
              clearInterval(t);
              let res,
                pay = 0,
                nm = st.mode;
              if (st.ggRemain > 0) {
                res = forceOddWinIfNeeded(genGG(), "ggOdd");
                pay = res.pay || 0;
                if (res.hit) {
                  st.stock += res.sets || 1;
                  st.note = res.note;
                }
                st.ggRemain--;
                if (st.ggRemain <= 0) endGG();
                return finish(res, pay, st.mode);
              }
              if (st.gstop > 0) {
                res = forceOddWinIfNeeded(genGS(), "gstopOdd");
                pay = res.pay || 0;
                if (res.hit && (res.endGStop || res.direct)) {
                  st.gstop = 0;
                  startGG(res.sets || 1, res.reason);
                  nm = "gg";
                } else if (res.hit && res.keepGStop) {
                  st.stock += res.sets || 1;
                  st.gstopHit = true;
                  st.note = res.note + " / GG保持";
                  st.gstop--;
                  if (st.gstop <= 0) {
                    startGG(1, "gstop");
                    nm = "gg";
                  } else {
                    nm = "gstop";
                  }
                } else {
                  st.gstop--;
                  if (st.gstop <= 0) {
                    if (st.gstopHit) {
                      startGG(1, "gstop");
                      nm = "gg";
                    } else if ((st.gstopStock || 0) > 0) {
                      startGStop("G-STOP再放出");
                      nm = "gstop";
                    } else {
                      st.mode = "lowA";
                      st.phase = "normal";
                      st.note = "G-STOP終了";
                      nm = "lowA";
                    }
                  } else {
                    nm = "gstop";
                  }
                }
                return finish(res, pay, nm);
              }
              if (st.gzone > 0) {
                res = forceOddWinIfNeeded(genGZ(), "gzoneOdd");
                pay = res.pay || 0;
                if (res.hit) {
                  startGG(res.sets || 1, res.reason);
                  pay += 30;
                  nm = "gg";
                } else {
                  st.gzone--;
                  if (st.gzone <= 0) {
                    st.mode = "lowA";
                    st.phase = "normal";
                    st.note = "G-ZONE終了";
                    nm = "lowA";
                  }
                }
                return finish(res, pay, nm);
              }
              if (st.pre > 0) {
                st.tenjoG = (st.tenjoG || 0) + 1;
                res = genPre();
                st.pre--;
                if (st.pre <= 0 && st.pending) {
                  startGG(st.hold || 1, st.holdReason);
                  st.pending = false;
                  res.hit = true;
                  res.autoStop = true;
                  nm = "gg";
                }
                return finish(res, res.pay || 0, nm);
              }
              st.tenjoG = (st.tenjoG || 0) + 1;
              res = forceOddWinIfNeeded(genNormal(st.tenjoG >= CEILING_G));
              pay = res.pay || 0;
              nm = res.child ? trans({ k: res.child }) : st.mode;
              if (res.direct) {
                startGG(res.sets || 1, res.reason);
                nm = "gg";
              } else if (res.hit) {
                startPre(res.sets || 1, res.reason || "mode", res.note);
                pay = 0;
                nm = st.mode;
              } else if (res.gstopNow && (st.gstopStock || 0) > 0) {
                startGStop(res.note);
                nm = "gstop";
              }
              finish(res, pay, nm);
            }
          }, 55);
      }
      function reset() {
        autoLeft = 0;
        st = {
          g: 0,
          coin: 0,
          spend: 0,
          earn: 0,
          mode: "lowA",
          phase: "normal",
          e: ["0", "0", "0"],
          role: "none",
          spin: false,
          panel: null,
          h: [],
          mute: true,
          h5: [],
          pre: 0,
          pending: false,
          hold: 0,
          holdReason: "mode",
          gstop: 0,
          gstopStock: 0,
          gstopHit: false,
          tenjoG: 0,
          note: "",
          ggRemain: 0,
          stock: 0,
          gzone: 0,
          lastLoop: "-",
          ggStage: "OLYMPUS",
          normalStage: "湖",
          stageGames: 0,
          forceRole: null,
        };
        save();
        render();
      }
      function auto(n) {
        if (st.spin) return;
        autoLeft = n;
        spin();
      }
      function autoInfinite() {
        if (st.spin) return;
        autoLeft = -1;
        spin();
      }
      function setDebugMode(mode) {
        st.mode = mode;
        st.phase = "normal";
        st.pre = 0;
        st.pending = false;
        st.ggRemain = 0;
        st.gzone = 0;
        st.gstop = 0;
        st.gstopHit = false;
        st.hold = 0;
        st.holdReason = "mode";
        maybeStageChange(true, mode);
        st.note = `DEBUG ${M[mode]?.[0] || mode}`;
      }
      function handleDebug(act) {
        if (!act) return;
        if (act.startsWith("mode:")) {
          setDebugMode(act.split(":")[1]);
        } else if (act.startsWith("role:")) {
          st.forceRole = act.split(":")[1];
          st.note = "DEBUG 次ゲーム小役指定";
        } else if (act === "gg") {
          startGG(1, "debug");
        } else if (act === "gzone") {
          st.ggRemain = 0;
          st.gstop = 0;
          st.gzone = 5;
          st.mode = "gzone";
          st.phase = "gzone";
          st.note = "DEBUG G-ZONE";
        } else if (act === "gstop") {
          st.gstopStock = (st.gstopStock || 0) + 1;
          startGStop("DEBUG G-STOP");
        } else if (act === "tenjo") {
          st.ggRemain = 0;
          st.gzone = 0;
          st.gstop = 0;
          st.pre = 0;
          st.pending = false;
          st.mode = "lowA";
          st.phase = "normal";
          st.tenjoG = CEILING_G - 1;
          maybeStageChange(true, st.mode);
          st.note = "DEBUG 天井直前";
        } else if (act === "stage") {
          maybeStageChange(true, st.mode);
          st.note = "DEBUG ステチェン";
        }
        save();
        render();
      }
      function key(k) {
        if (k === "AC") return reset();
        if (k === "MODE") st.panel = st.panel === "mode" ? null : "mode";
        else if (k === "DATA") st.panel = st.panel === "data" ? null : "data";
        else if (k === "÷") st.panel = st.panel === "hist" ? null : "hist";
        else if (k === "×") st.panel = st.panel === "debug" ? null : "debug";
        else if (k === "−") st.mute = !st.mute;
        else if ("123456789".includes(k)) return auto(+k);
        else if (k === "0") return auto(10);
        else if (k === "00") return auto(100);
        else if (k === ".") return autoInfinite();
        else return spin();
        render();
      }
      function safe() {
        try {
          localStorage.setItem("__t", "1");
          localStorage.removeItem("__t");
          return true;
        } catch (e) {
          return false;
        }
      }
      const STORE = safe();
      const STORE_KEY = "calc777v124_status_num_larger";
      function save() {
        if (STORE) localStorage.setItem(STORE_KEY, JSON.stringify(st));
      }
      function load() {
        if (STORE) {
          try {
            let x = JSON.parse(localStorage.getItem(STORE_KEY) || "null");
            if (x) {
              st = { ...st, ...x, spin: false, panel: null };
              st.gstopStock = st.gstopStock || 0;
              st.gstopHit = !!st.gstopHit;
              st.tenjoG = st.tenjoG || 0;
              st.normalStage = st.normalStage || "湖";
              st.stageGames = st.stageGames || 0;
              st.forceRole = null;
              st.h5 = (st.h5 || []).map(cleanHistItem).slice(-5);
            }
          } catch (e) {
            localStorage.removeItem(STORE_KEY);
          }
        }
      }
      function build() {
        let rows = [
          ["AC", "MODE", "DATA", "÷"],
          ["7", "8", "9", "×"],
          ["4", "5", "6", "−"],
          ["1", "2", "3", "+"],
          ["0", "00", ".", "="],
        ];
        $("keys").innerHTML = rows
          .flat()
          .map(
            (k) =>
              `<button class="${k === "AC" ? "d" : ["MODE", "DATA", "÷", "×", "−", "+", "="].includes(k) ? "o" : "n"}" data-k="${k}">${k}</button>`,
          )
          .join("");
        $("keys").onclick = (e) => {
          let b = e.target.closest("button");
          if (b) key(b.dataset.k);
        };
        $("pa").onclick = (e) => {
          let b = e.target.closest("button[data-debug]");
          if (b) handleDebug(b.dataset.debug);
        };
      }
      document.addEventListener(
        "pointerdown",
        () => {
          if (autoLeft !== 0) stopAuto("AUTO停止");
        },
        { passive: true },
      );
      load();
      build();
      render();
    </script>
  </body>
</html>
