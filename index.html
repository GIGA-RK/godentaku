<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>CALC-777 v15.3</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        background: #09090b;
        color: #eee;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 12px;
      }
      .w {
        width: 100%;
        max-width: 390px;
      }
      .top {
        display: flex;
        justify-content: space-between;
        color: #aaa;
        font-size: 11px;
        padding: 0 4px 10px;
      }
      .calc {
        border: 1px solid #52525b;
        border-radius: 30px;
        padding: 16px;
        background: linear-gradient(#3f3f46, #09090b);
        box-shadow: 0 20px 50px #000a;
      }
      .fr {
        border-radius: 19px;
        padding: 14px 12px 12px;
        border: 1px solid #fff2;
      }
      .lowA {
        background: linear-gradient(135deg, #334155, #0f172a);
      }
      .lowB {
        background: linear-gradient(135deg, #475569, #111827);
      }
      .normal {
        background: linear-gradient(135deg, #4338ca, #0f172a);
      }
      .prepA {
        background: linear-gradient(135deg, #7c3aed, #0f172a);
      }
      .v {
        background: linear-gradient(135deg, #6d28d9, #0f172a);
      }
      .heavenS {
        background: linear-gradient(135deg, #d97706, #0f172a);
      }
      .heavenL {
        background: linear-gradient(135deg, #b45309, #020617);
      }
      .super {
        background: linear-gradient(135deg, #dc2626, #0f172a);
      }
      .gg {
        background: linear-gradient(135deg, #047857, #0f172a);
      }
      .gzone,
      .gstop {
        background: linear-gradient(135deg, #0e7490, #0f172a);
      }
      .lcd {
        position: relative;
        min-height: 94px;
        border-radius: 14px;
        background: #b9c8a0;
        color: #132014;
        padding: 9px 10px 10px;
        font-family: ui-monospace, Menlo, Consolas, monospace;
        box-shadow: inset 0 5px 15px #0005;
      }
      .meta {
        display: flex;
        justify-content: space-between;
        opacity: 0.66;
        font-size: 10px;
        font-weight: 800;
      }
      .lcdMain {
        display: grid;
        grid-template-columns: 94px minmax(0, 1fr);
        gap: 8px;
        align-items: stretch;
      }
      .lcdSide {
        display: grid;
        grid-template-rows: minmax(34px, 1fr) minmax(36px, 1fr);
        gap: 6px;
        min-width: 0;
      }
      .stageBig,
      .roleBig {
        border-radius: 10px;
        border: 1px solid #23311f55;
        background: #23311f24;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 2px 4px;
        font-weight: 950;
        line-height: 1.05;
        overflow: hidden;
      }
      .stageBig {
        min-height: 32px;
        flex-direction: column;
      }
      .roleBig {
        min-height: 34px;
        font-size: clamp(13px, 3.6vw, 15px);
        letter-spacing: -0.03em;
        white-space: nowrap;
        text-overflow: clip;
      }
      .stageMain {
        display: block;
        font-size: clamp(11px, 3.0vw, 14px);
        white-space: nowrap;
      }
      .stageSub {
        display: block;
        margin-top: 0;
        font-size: 9px;
        font-weight: 900;
        opacity: 0.9;
        white-space: nowrap;
      }
      .lcdRight,
      .lcdInfo {
        min-width: 0;
      }
      .lcdRight {
        display: grid;
        grid-template-rows: auto 1fr;
        align-items: start;
      }
      .line {
        font-weight: 950;
        font-size: 13px;
        line-height: 1.3;
        letter-spacing: 0;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: clip;
        font-variant-numeric: tabular-nums;
      }
      .sub {
        font-size: 11px;
        line-height: 1.25;
        letter-spacing: 0;
        font-weight: 900;
        opacity: 0.86;
        white-space: nowrap;
        margin-top: 1px;
        overflow: hidden;
        text-overflow: clip;
        font-variant-numeric: tabular-nums;
      }
      .lcdLine1,
      .lcdLine2 {
        display: grid;
        align-items: center;
        min-width: 0;
      }
      .lcdLine1 {
        grid-template-columns: 96px 110px;
        column-gap: 6px;
      }
      .lcdLine2 {
        grid-template-columns: 94px minmax(0, 1fr);
        column-gap: 10px;
      }
      .lcdLine1 > span,
      .lcdLine2 > span {
        display: block;
        min-width: 0;
        overflow: hidden;
        white-space: nowrap;
        text-overflow: clip;
      }
      #statusText {
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.01em;
      }
      .miniLabel {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-weight: 500;
        letter-spacing: 0;
      }
      .miniNum {
        font-family: "Helvetica Neue", "Arial Narrow", Arial, sans-serif;
        font-weight: 300;
        letter-spacing: 0.02em;
        font-variant-numeric: tabular-nums;
      }
      .coinPos {
        color: #1e3a8a;
      }
      .coinNeg {
        color: #991b1b;
      }
      .coinZero {
        color: #132014;
      }
      #statusText .miniLabel {
        font-size: 11px;
      }
      #statusText .miniNum {
        font-size: 14px;
      }
      .lcdLine2 > span:last-child {
        text-align: right;
      }
      .histText {
        display: inline-grid !important;
        grid-template-columns: 34px repeat(5, 12px);
        align-items: center;
        column-gap: 0;
        overflow: visible !important;
      }
      .histLabel {
        margin-right: 0;
      }
      .histSym {
        display: inline-block;
        width: 12px;
        text-align: center;
        font-family: Impact, "Arial Black", "Segoe UI Black", sans-serif;
        font-size: 16px;
        line-height: 0.95;
        font-weight: 900;
        letter-spacing: -0.08em;
        color: #132014;
        background: transparent;
        border: none;
      }
      .histBlue {
        color: #2563eb;
      }
      .histYellow {
        color: #b88600;
      }
      .histGem {
        color: #16a34a;
      }
      .ggBanner {
        position: absolute;
        left: 50%;
        top: -13px;
        transform: translateX(-50%);
        display: none;
        padding: 1px 11px 2px;
        border-radius: 999px;
        border: 1px solid #ca8a04;
        background: #fde047;
        color: #78350f;
        font-size: 11px;
        font-weight: 950;
        letter-spacing: 0.04em;
        line-height: 1.2;
        z-index: 3;
        box-shadow: 0 1px 0 #ffffff66 inset, 0 2px 4px #0003;
        pointer-events: none;
      }
      .ggBanner.show {
        display: block;
      }
      .ggBanner.bannerGG {
        border-color: #ca8a04;
        background: #fde047;
        color: #78350f;
      }
      .ggBanner.bannerGStop {
        border-color: #16a34a;
        background: #86efac;
        color: #14532d;
      }
      .ggBanner.bannerGZone {
        border-color: #f97316;
        background: #fdba74;
        color: #7c2d12;
      }
      .ggBanner.bannerSGG {
        border-color: #dc2626;
        background: #fca5a5;
        color: #7f1d1d;
      }
      .reels.atActive {
        padding: 4px;
        border: 3px solid #facc15;
        border-radius: 14px;
        background: #facc1520;
        box-shadow: inset 0 0 0 1px #92400e55;
      }
      .reels.winAlert,
      .reels.atActive.winAlert {
        padding: 4px;
        border: 4px solid #ef4444;
        border-radius: 14px;
        background: #ef444425;
        box-shadow:
          0 0 0 2px #fee2e2 inset,
          0 0 14px #ef444477,
          0 2px 6px #0004;
      }
      .dummyCalc .ggBanner {
        display: none !important;
      }
      .dummyCalc .lcdMain {
        display: none;
      }
      .dummyScreen {
        display: none;
        min-height: 76px;
        align-items: stretch;
      }
      .dummyCalc .dummyScreen {
        display: grid;
      }
      .dummyBox {
        border-radius: 12px;
        border: 1px solid #23311f55;
        background: #23311f24;
        padding: 8px 9px;
        display: grid;
        grid-template-rows: auto 1fr;
        min-width: 0;
      }
      .dummyTop {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 10px;
        font-weight: 900;
        opacity: 0.72;
        letter-spacing: 0.02em;
      }
      .dummyValue {
        align-self: end;
        text-align: right;
        font-family: "Helvetica Neue", "Arial Narrow", Arial, sans-serif;
        font-weight: 300;
        font-size: 30px;
        line-height: 1.05;
        letter-spacing: 0.02em;
        font-variant-numeric: tabular-nums;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: clip;
      }
      .reels {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 7px;
        margin-top: 8px;
        justify-self: end;
        width: 100%;
      }
      .reel {
        height: 48px;
        line-height: 44px;
        border-radius: 10px;
        text-align: center;
        font-size: 34px;
        font-weight: 950;
        background: #23311f38;
        border: 1px solid #23311f55;
      }
      .reelSym {
        display: inline-block;
        font-weight: 950;
        line-height: 1;
      }
      .reelRed {
        color: #991b1b;
      }
      .reelYellow {
        color: #a16207;
      }
      .reelGreen {
        color: #166534;
      }
      .reelRainbow {
        color: transparent;
        background: linear-gradient(90deg, #dc2626, #f97316, #eab308, #16a34a, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        background-clip: text;
        text-shadow: none;
      }
      .spin .reel {
        opacity: 0.65;
      }
      /* v13.8: 液晶を上下2段に再構成。上=情報、下=ステージ/小役/リール3マス */
      .lcd {
        min-height: 132px;
        padding: 10px;
      }
      .lcdMain {
        display: grid;
        grid-template-columns: 1fr;
        grid-template-rows: minmax(54px, auto) minmax(50px, 1fr);
        gap: 8px;
        align-items: stretch;
      }
      .lcdInfo {
        width: 100%;
        min-width: 0;
        border-radius: 10px;
        border: 1px solid #23311f33;
        background: #23311f18;
        padding: 5px 7px;
        display: grid;
        grid-template-rows: auto auto;
        gap: 2px;
      }
      .lcdBottom {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 6px;
        align-items: stretch;
        min-width: 0;
      }
      .lcdSide,
      .lcdRight {
        display: contents;
      }
      .lcdLine1,
      .lcdLine2 {
        display: grid;
        align-items: center;
        min-width: 0;
      }
      .lcdLine1 {
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        column-gap: 10px;
      }
      .lcdLine2 {
        grid-template-columns: minmax(94px, 1fr) minmax(96px, 1fr);
        column-gap: 10px;
      }
      .line {
        font-size: clamp(11px, 3.1vw, 13px);
        line-height: 1.22;
      }
      .sub {
        font-size: clamp(9px, 2.7vw, 11px);
        line-height: 1.16;
      }
      .lcdLine1 > span,
      .lcdLine2 > span {
        min-width: 0;
        overflow: hidden;
        white-space: nowrap;
        text-overflow: clip;
      }
      #statusText {
        text-align: right;
        font-size: clamp(10px, 2.8vw, 12px);
      }
      .miniLabel {
        letter-spacing: -0.02em;
      }
      .miniNum {
        letter-spacing: 0;
      }
      #statusText .miniLabel {
        font-size: clamp(9px, 2.4vw, 10px);
      }
      #statusText .miniNum {
        font-size: clamp(11px, 3vw, 14px);
      }
      .histText {
        grid-template-columns: 30px repeat(5, 12px);
      }
      .histSym {
        font-size: 15px;
      }
      .lcdBottom .stageBig,
      .lcdBottom .roleBig {
        min-height: 48px;
        height: 48px;
        padding: 2px 3px;
        border-radius: 10px;
      }
      .lcdBottom .stageMain {
        font-size: clamp(10px, 2.8vw, 13px);
      }
      .lcdBottom .stageSub {
        font-size: 8px;
      }
      .lcdBottom .roleBig {
        font-size: clamp(10px, 2.8vw, 13px);
        letter-spacing: -0.04em;
      }
      .lcdBottom .reels {
        grid-column: span 3;
        width: 100%;
        margin-top: 0;
        gap: 6px;
        align-self: stretch;
      }
      .lcdBottom .reel {
        height: 48px;
        line-height: 44px;
        font-size: clamp(27px, 8vw, 34px);
      }
      .lcdBottom .reels.atActive {
        padding: 2px;
        border-width: 2px;
      }
      @media (max-width: 380px) {
        .lcd {
          padding: 9px;
        }
        .lcdMain {
          gap: 7px;
        }
        .lcdBottom {
          gap: 5px;
        }
        .lcdLine1 {
          column-gap: 7px;
        }
        .lcdLine2 {
          column-gap: 7px;
          grid-template-columns: minmax(88px, 1fr) minmax(88px, 1fr);
        }
        .histText {
          grid-template-columns: 27px repeat(5, 11px);
        }
        .histSym {
          width: 11px;
          font-size: 14px;
        }
        .lcdBottom .stageBig,
        .lcdBottom .roleBig,
        .lcdBottom .reel {
          height: 45px;
          min-height: 45px;
        }
        .lcdBottom .reel {
          line-height: 41px;
        }
      }
      /* v13.9: 上段情報を大きく、リール3図柄を同一パネル化 */
      .lcdInfo {
        padding: 6px 8px;
        gap: 3px;
      }
      .line {
        font-size: clamp(13px, 3.65vw, 16px);
        line-height: 1.18;
      }
      .sub {
        font-size: clamp(12px, 3.35vw, 15px);
        line-height: 1.12;
      }
      #statusText {
        font-size: clamp(12px, 3.35vw, 15px);
      }
      #statusText .miniLabel {
        font-size: clamp(11px, 3vw, 13px);
      }
      #statusText .miniNum {
        font-size: clamp(13px, 3.65vw, 16px);
      }
      .histText {
        grid-template-columns: 34px repeat(5, 13px);
        column-gap: 1px;
      }
      .histSym {
        width: 13px;
        font-size: 16px;
      }
      .lcdBottom .reels {
        grid-column: span 3;
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
        align-items: center;
        min-height: 48px;
        height: 48px;
        border-radius: 10px;
        border: 1px solid #23311f55;
        background: #23311f24;
        padding: 3px 7px;
        box-sizing: border-box;
      }
      .lcdBottom .reel {
        height: 40px;
        line-height: 38px;
        min-height: 0;
        border: none;
        background: transparent;
        font-size: clamp(28px, 7.8vw, 34px);
      }
      .lcdBottom .reels.atActive {
        padding: 2px 6px;
        gap: 8px;
        border-width: 2px;
        background: #facc1520;
      }
      @media (max-width: 380px) {
        .line {
          font-size: clamp(12px, 3.45vw, 15px);
        }
        .sub,
        #statusText {
          font-size: clamp(11px, 3.15vw, 14px);
        }
        #statusText .miniLabel {
          font-size: clamp(10px, 2.75vw, 12px);
        }
        #statusText .miniNum {
          font-size: clamp(12px, 3.35vw, 15px);
        }
        .histText {
          grid-template-columns: 30px repeat(5, 12px);
        }
        .histSym {
          width: 12px;
          font-size: 15px;
        }
        .lcdBottom .reels {
          gap: 6px;
          padding: 3px 5px;
          height: 45px;
          min-height: 45px;
        }
        .lcdBottom .reel {
          height: 37px;
          line-height: 35px;
          font-size: clamp(26px, 7.4vw, 31px);
        }
      }
      .keys {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
        margin-top: 14px;
      }
      button {
        min-height: 56px;
        border-radius: 17px;
        border: 1px solid #aaa;
        font-size: 18px;
        font-weight: 850;
        box-shadow: 0 7px #0005;
      }
      .n {
        background: #e4e4e7;
        color: #111;
      }
      .o {
        background: #3f3f46;
        color: #eee;
      }
      .d {
        background: #be123c;
        color: white;
      }
      .p {
        display: none;
        margin-top: 12px;
        padding: 12px;
        border-radius: 18px;
        background: #18181b;
        border: 1px solid #3f3f46;
        font-size: 13px;
      }
      .p.show {
        display: block;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 8px;
      }
      .card {
        background: #27272a;
        border-radius: 12px;
        padding: 9px;
      }
      .card b {
        display: block;
        font-size: 20px;
      }
      .tag {
        display: inline-block;
        border: 1px solid #52525b;
        border-radius: 999px;
        padding: 2px 7px;
        margin: 2px 4px 2px 0;
        background: #27272a;
        font-size: 11px;
      }
      .small {
        font-size: 12px;
        color: #aaa;
        line-height: 1.65;
      }
      .hist {
        max-height: 170px;
        overflow: auto;
        display: grid;
        gap: 6px;
      }
      .hrow {
        display: grid;
        grid-template-columns: 42px 52px 1fr 45px;
        gap: 4px;
        background: #27272a;
        border-radius: 10px;
        padding: 8px;
        font-size: 11px;
      }
      .dataStats {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 5px;
        margin-top: 8px;
        font-size: 10px;
      }
      .dataStats span {
        display: block;
        background: #27272a;
        border-radius: 9px;
        padding: 6px 4px;
        text-align: center;
        color: #cbd5e1;
        white-space: nowrap;
      }
      .dataStats b {
        display: block;
        margin-top: 2px;
        color: #fff;
        font-size: 13px;
        font-weight: 800;
        font-variant-numeric: tabular-nums;
      }
      .slumpBox {
        margin-top: 9px;
        border-radius: 12px;
        background: #0f172a;
        border: 1px solid #334155;
        padding: 8px;
      }
      .slumpTitle {
        display: flex;
        justify-content: space-between;
        color: #cbd5e1;
        font-size: 10px;
        font-weight: 800;
        margin-bottom: 5px;
      }
      .slumpSvg {
        display: block;
        width: 100%;
        height: 184px;
      }
      .slumpGrid {
        stroke: #334155;
        stroke-width: 1;
        opacity: 0.7;
      }
      .slumpZero {
        stroke: #94a3b8;
        stroke-width: 1.2;
        opacity: 0.9;
      }
      .slumpAxis {
        stroke: #cbd5e1;
        stroke-width: 1.1;
        opacity: 0.95;
      }
      .slumpTick {
        stroke: #94a3b8;
        stroke-width: 1;
        opacity: 0.85;
      }
      .slumpLabel {
        fill: #cbd5e1;
        font-size: 9px;
        font-weight: 800;
        font-family: "Helvetica Neue", Arial, sans-serif;
      }
      .slumpUnit {
        fill: #94a3b8;
        font-size: 8px;
        font-weight: 800;
        font-family: "Helvetica Neue", Arial, sans-serif;
      }
      .slumpLine {
        fill: none;
        stroke: #60a5fa;
        stroke-width: 2.2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .dbgSec {
        margin-top: 10px;
      }
      .dbgTitle {
        font-size: 12px;
        color: #cbd5e1;
        font-weight: 900;
        margin: 0 0 6px;
      }
      .dbgBtns {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 6px;
      }
      .dbgBtns button {
        min-height: 34px;
        border-radius: 10px;
        box-shadow: none;
        font-size: 11px;
        font-weight: 900;
        padding: 4px 2px;
      }
      .foot {
        margin-top: 10px;
        text-align: center;
        color: #777;
        font-size: 10px;
        line-height: 1.55;
      }
    </style>
  </head>
  <body>
    <main class="w">
      <div class="top">
        <div>▣ CALC-777 v15.3</div>
        <div>calculator</div>
      </div>
      <section class="calc">
        <div id="fr" class="fr lowA">
          <div class="lcd">
            <div id="ggBanner" class="ggBanner">GOD GAME中</div>
            <div id="dummyScreen" class="dummyScreen">
              <div class="dummyBox">
                <div class="dummyTop"><span>CALC</span><span>DEG</span></div>
                <div id="dummyValue" class="dummyValue">0</div>
              </div>
            </div>
            <div class="lcdMain">
              <div class="lcdInfo">
                <div id="ga" class="line lcdLine1">
                  <span id="gameText">G数：000000</span>
                  <span id="coinText">Coin：000000</span>

          if (res.hit) {
            st.stock += res.sets || 1;
            st.note = res.note;
          }
          if (res.resetSGG) {
            // SGG中はGG残りG数を消費しない。赤7/S揃い時はSGGだけ16Gへ再セット。
            st.sggRemain = 16;
          } else {
            st.sggRemain--;
          }
          if (st.sggRemain <= 0) {
            st.sggRemain = 0;
            st.phase = st.ggRemain > 0 ? "gg" : "normal";
            st.note = res.note + " / SGG終了";
          }
          return finish(res, pay, st.mode);
        }

        if (branch === "gg") {
          if (res.hit) {
            st.stock += res.sets || 1;
            st.note = res.note;
          }
          if (res.startSGG) {
            st.sggRemain = 16;
            st.ggRemain = Math.max(st.ggRemain, 16);
          }
          st.ggRemain--;
          if (st.ggRemain <= 0) {
            st.sggRemain = 0;
            endGG();
          }
          return finish(res, pay, st.mode);
        }

        if (branch === "gstop") {
          const wasInGG = !!st.gstopInGG;

          if (res.hit && (res.endGStop || res.direct)) {
            st.gstop = 0;
            if (wasInGG) {
              st.stock += res.sets || 1;
              if (res.reason === "red7") st.sggRemain = 16;
              resumeGGFromGStop(res.note + " / GG上乗せ");
              nm = st.mode;
            } else {
              startGG(res.sets || 1, res.reason);
              nm = st.mode;
            }
          } else if (res.hit && res.keepGStop) {
            st.stock += res.sets || 1;
            st.gstopHit = true;
            st.note = res.note + " / GG保持";
            st.gstop--;
            if (st.gstop <= 0) {
              if (wasInGG) {
                resumeGGFromGStop("G-STOP終了 / GG再開");
                nm = st.mode;
              } else {
                startGG(1, "gstop");
                nm = st.mode;
              }
            } else {
              nm = st.mode;
            }
          } else {
            st.gstop--;
            if (st.gstop <= 0) {
              if (st.gstopHit) {
                if (wasInGG) {
                  resumeGGFromGStop("G-STOP終了 / GG再開");
                  nm = st.mode;
                } else {
                  startGG(1, "gstop");
                  nm = st.mode;
                }
              } else if (wasInGG && (st.gstopStockAT || 0) > 0) {
                resumeGGFromGStop("G-STOP終了 / GG再開");
                startGStopPre("AT中G-STOP再前兆", true);
                nm = st.mode;
              } else if ((st.gstopStock || 0) > 0 && !wasInGG) {
                st.phase = "normal";
                startGStopPre("G-STOP再前兆");
                nm = st.mode;
              } else if (wasInGG) {
                resumeGGFromGStop("G-STOP終了 / GG再開");
                nm = st.mode;
              } else {
                st.mode = "lowA";
                st.phase = "normal";
                st.gstopInGG = false;
                st.note = "G-STOP終了";
                nm = st.mode;
              }
            } else {
              nm = st.mode;
            }
          }
          return finish(res, pay, nm);
        }

        if (branch === "gzone") {
          if (res.hit) {
            startGG(res.sets || 1, res.reason);
            pay += 30;
            nm = st.mode;
          } else {
            st.gzone--;
            if (st.gzone <= 0) {
              st.mode = "lowA";
              st.phase = "normal";
              st.note = "G-ZONE終了";
              nm = st.mode;
              if ((st.gstopStock || 0) > 0) startGStopPre("G-ZONE終了 / G-STOP前兆");
            }
          }
          return finish(res, pay, nm);
        }

        if (branch === "pre") {
          st.pre--;

          if (res.direct) {
            st.pending = false;
            startGG(res.sets || 1, res.reason);
            nm = st.mode;
            return finish(res, pay, nm);
          }

          if (st.pre <= 0 && st.pending) {
            startGG(st.hold || 1, st.holdReason);
            st.pending = false;
            res.hit = true;
            res.autoStop = true;
            nm = st.mode;
          }
          return finish(res, pay, nm);
        }

        if (branch === "gstopPre") {
          st.gstopPre--;

          if (res.direct) {
            startGG(res.sets || 1, res.reason);
            nm = st.mode;
            return finish(res, pay, nm);
          }

          if (res.startGStop) {
            startGStop(res.note);
            nm = st.mode;
          } else {
            nm = st.mode;
          }
          return finish(res, pay, nm);
        }

        if (res.direct) {
          startGG(res.sets || 1, res.reason);
          nm = st.mode;
        } else if (res.hit) {
          startPre(res.sets || 1, res.reason || "mode", res.note);
          pay = 0;
          nm = st.mode;
        } else if (res.gstopNow && (st.gstopStock || 0) > 0) {
          startGStopPre(res.note);
          nm = st.mode;
        }
        return finish(res, pay, nm);
      }
      function spinPreviewEye() {
        if (st.sggRemain > 0) return nEye();
        if (st.gstop > 0) return gstopMissEye();
        if (st.gstopPre > 0) return Math.random() < 0.35 ? eyes(pick([...EYE_GROUPS.gstopWeak, ...EYE_GROUPS.gstopStrong])) : nEye();
        if (st.gzone > 0) return eyes(pick(GZ));
        return nEye();
      }
      function shouldShowReelAlert(res) {
        return !!(
          res &&
          (
            res.hit ||
            res.direct ||
            res.startGStop ||
            res.gstopNow ||
            res.keepGStop ||
            res.endGStop
          )
        );
      }
      function finish(res, pay, nm) {
        let code = res.e.join("");
        st.e = res.e;
        st.reelAlert = shouldShowReelAlert(res);
        st.role = res.role || "none";
        st.mode = safeMode(nm || st.mode);
        st.g++;
        const bet = 3;
        const payout = pay || 0;
        st.coin += payout - bet;
        st.spend += bet;
        st.earn += payout;
        st.coinLog = st.coinLog || [0];
        st.coinLog.push(st.coin);
        const roleLabel = PAY[st.role] ? PAY[st.role][0] : "";
        st.h.unshift({
          g: st.g,
          e: code,
          r: roleLabel,
          k: kind(code),
          p: payout,
        });
        st.h = st.h.slice(0, 30);
        maybeStageChange(false, st.mode);
        if (autoStop(res, code)) autoLeft = 0;
        st.spin = false;
        save();
        render();
        if (autoLeft !== 0) setTimeout(spin, AUTO_NEXT_DELAY);
      }
      function spin() {
        if (st.spin) return;
        st.reelAlert = false;
        if (autoLeft > 0) autoLeft--;

        const out = prepareSpinOutcome();
        const delayed = shouldDelay(out);
        if (delayed) {
          out.res = applyDelayEye(out.res);
          st.delayed = true;
          st.note = (out.res.note || "") + " / 遅れ";
        } else {
          st.delayed = false;
        }

        st.spin = true;
        render();

        const startDelay = delayed ? 360 : 0;
        const tickMs = delayed ? 72 : 55;
        const maxFrames = delayed ? 14 : 8;

        setTimeout(() => {
          let n = 0,
            t = setInterval(() => {
              st.e = spinPreviewEye();
              render();
              if (++n > maxFrames) {
                clearInterval(t);
                st.delayed = false;
              st.reelAlert = false;
                return applySpinOutcome(out);
              }
            }, tickMs);
        }, startDelay);
      }
      function reset() {
        autoLeft = 0;
        st = {
          g: 0,
          coin: 0,
          spend: 0,
          earn: 0,
          mode: "lowA",
          phase: "normal",
          e: ["0", "1", "2"],
          role: "none",
          spin: false,
          panel: null,
          h: [],
          mute: true,
          h5: [],
          pre: 0,
          pending: false,
          hold: 0,
          holdReason: "mode",
          gstop: 0,
          gstopStock: 0,
          gstopStockAT: 0,
          gstopPre: 0,
          gstopPreInGG: false,
          gstopHit: false,
          gstopInGG: false,
          tenjoG: 0,
          note: "",
          ggRemain: 0,
          sggRemain: 0,
          stock: 0,
          gzone: 0,
          lastLoop: "-",
          ggStage: "OLYMPUS",
          normalStage: "湖",
          stageGames: 0,
          forceRole: null,
          dummy: false,
          dummyValue: "0",
          delayed: false,
          reelAlert: false,
          coinLog: [0],
        };
        save();
        render();
      }
      function auto(n) {
        if (st.spin) return;
        autoLeft = n;
        spin();
      }
      function autoInfinite() {
        if (st.spin) return;
        autoLeft = -1;
        spin();
      }
      function setDebugMode(mode) {
        st.mode = safeMode(mode);
        st.phase = "normal";
        st.pre = 0;
        st.pending = false;
        st.ggRemain = 0;
        st.sggRemain = 0;
        st.gzone = 0;
        st.gstop = 0;
        st.gstopPre = 0;
        st.gstopHit = false;
        st.gstopInGG = false;
        st.gstopPreInGG = false;
        st.gstopStockAT = 0;
        st.reelAlert = false;
        st.hold = 0;
        st.holdReason = "mode";
        maybeStageChange(true, mode);
        st.note = `DEBUG ${M[mode]?.[0] || mode}`;
      }
      function handleDebug(act) {
        if (!act) return;
        if (act.startsWith("mode:")) {
          setDebugMode(act.split(":")[1]);
        } else if (act.startsWith("role:")) {
          st.forceRole = act.split(":")[1];
          st.note = "DEBUG 次ゲーム小役指定";
        } else if (act === "gg") {
          startGG(1, "debug");
        } else if (act === "gzone") {
          st.ggRemain = 0;
          st.gstop = 0;
          st.gstopInGG = false;
          st.gstopPreInGG = false;
          st.gzone = 5;
          st.phase = "gzone";
          st.note = "DEBUG G-ZONE";
        } else if (act === "gstop") {
          st.gstopStock = (st.gstopStock || 0) + 1;
          startGStop("DEBUG G-STOP");
        } else if (act === "tenjo") {
          st.ggRemain = 0;
          st.gzone = 0;
          st.gstop = 0;
          st.pre = 0;
          st.pending = false;
          st.mode = "lowA";
          st.phase = "normal";
          st.tenjoG = CEILING_G - 1;
          maybeStageChange(true, st.mode);
          st.note = "DEBUG 天井直前";
        } else if (act === "stage") {
          maybeStageChange(true, st.mode);
          st.note = "DEBUG ステチェン";
        }
        save();
        render();
      }
      function toggleDummy() {
        st.dummy = !st.dummy;
        if (st.dummy) {
          stopAuto("DUMMY");
          st.dummyValue = st.dummyValue || "0";
        }
        save();
        render();
      }
      function dummyKey(k) {
        if (k === "−") return toggleDummy();
        if (k === "AC") {
          st.dummyValue = "0";
        } else if (/^[0-9]$/.test(k)) {
          st.dummyValue = st.dummyValue === "0" ? k : (st.dummyValue + k).slice(-12);
        } else if (k === "00") {
          st.dummyValue = st.dummyValue === "0" ? "0" : (st.dummyValue + "00").slice(-12);
        } else if (k === ".") {
          if (!st.dummyValue.includes(".")) st.dummyValue += ".";
        } else if (["+", "×", "÷", "="].includes(k)) {
          st.dummyValue = "0";
        } else if (["MODE", "DATA"].includes(k)) {
          st.dummyValue = st.dummyValue || "0";
        }
        save();
        render();
      }
      function key(k) {
        if (st.dummy) return dummyKey(k);
        if (k === "−") return toggleDummy();
        if (k === "AC") return reset();
        if (k === "MODE") st.panel = st.panel === "mode" ? null : "mode";
        else if (k === "DATA") st.panel = st.panel === "data" ? null : "data";
        else if (k === "÷") st.panel = st.panel === "hist" ? null : "hist";
        else if (k === "×") st.panel = st.panel === "debug" ? null : "debug";
        else if ("123456789".includes(k)) return auto(+k);
        else if (k === "0") return auto(10);
        else if (k === "00") return auto(100);
        else if (k === ".") return autoInfinite();
        else return spin();
        render();
      }
      function safe() {
        try {
          localStorage.setItem("__t", "1");
          localStorage.removeItem("__t");
          return true;
        } catch (e) {
          return false;
        }
      }
      const STORE = safe();
      const STORE_KEY = "calc777v153_slump_axes_1000_2000";
      function save() {
        if (STORE) localStorage.setItem(STORE_KEY, JSON.stringify(st));
      }
      function load() {
        if (STORE) {
          try {
            let x = JSON.parse(localStorage.getItem(STORE_KEY) || "null");
            if (x) {
              st = { ...st, ...x, spin: false, panel: null };
              st.mode = safeMode(st.mode);
              st.gstopStock = st.gstopStock || 0;
              st.gstopStockAT = st.gstopStockAT || 0;
              st.gstopPreInGG = !!st.gstopPreInGG;
              st.gstopHit = !!st.gstopHit;
              st.gstopInGG = !!st.gstopInGG;
              st.tenjoG = st.tenjoG || 0;
              st.normalStage = st.normalStage || "湖";
              st.stageGames = st.stageGames || 0;
              st.forceRole = null;
              st.h5 = (st.h5 || []).map(cleanHistItem).slice(-5);
              st.dummy = !!st.dummy;
              st.dummyValue = st.dummyValue || "0";
              st.delayed = false;
              st.reelAlert = false;
              st.coinLog = st.coinLog && st.coinLog.length ? st.coinLog : [st.coin || 0];
              st.gstopPre = Number(st.gstopPre) || 0;
              st.sggRemain = Number(st.sggRemain) || 0;
            }
          } catch (e) {
            localStorage.removeItem(STORE_KEY);
          }
        }
      }
      function build() {
        let rows = [
          ["AC", "MODE", "DATA", "÷"],
          ["7", "8", "9", "×"],
          ["4", "5", "6", "−"],
          ["1", "2", "3", "+"],
          ["0", "00", ".", "="],
        ];
        $("keys").innerHTML = rows
          .flat()
          .map(
            (k) =>
              `<button class="${k === "AC" ? "d" : ["MODE", "DATA", "÷", "×", "−", "+", "="].includes(k) ? "o" : "n"}" data-k="${k}">${k}</button>`,
          )
          .join("");
        $("keys").onclick = (e) => {
          let b = e.target.closest("button");
          if (b) key(b.dataset.k);
        };
        $("pa").onclick = (e) => {
          let b = e.target.closest("button[data-debug]");
          if (b) handleDebug(b.dataset.debug);
        };
      }
      document.addEventListener(
        "pointerdown",
        (e) => {
          const b = e.target.closest && e.target.closest("button");
          const k = b && b.dataset ? b.dataset.k : "";
          if (k === "DATA" || k === "MODE") return;
          if (autoLeft !== 0) stopAuto("AUTO停止");
        },
        { passive: true },
      );
      load();
      build();
      render();
    </script>
  </body>
</html>
